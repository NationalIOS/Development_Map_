<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reserve Capital Partners • Development Pipeline</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --navy: #0a1428;
            --deepblue: #13294b;
            --accentblue: #1e3a8a;
            --teal: #22d3ee;
            --gold: #e2b44a;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
            background: #05080f;
            color: #e0e7ff;
            overflow: hidden;
            height: 100vh;
        }

        #header {
            background: linear-gradient(135deg, var(--navy) 0%, var(--deepblue) 100%);
            backdrop-filter: blur(16px);
            color: white;
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 6px 28px rgba(0,0,0,0.6);
            z-index: 1000;
            border-bottom: 3px solid var(--gold);
        }

        .logo { display: flex; align-items: center; gap: 18px; }
        .logo i { font-size: 46px; color: var(--teal); filter: drop-shadow(0 3px 8px rgba(34, 211, 238, 0.4)); }
        h1 { font-size: 28px; font-weight: 700; letter-spacing: -1.2px; }
        .subtitle { font-size: 14.8px; opacity: 0.85; margin-top: 2px; }

        .controls { display: flex; align-items: center; gap: 20px; }

        select {
            background: rgba(15, 23, 42, 0.95);
            color: #e0e7ff;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 11px 18px;
            font-size: 15.2px;
            min-width: 300px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        select:hover, select:focus {
            border-color: var(--teal);
            box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.15);
        }

        #map { height: calc(100vh - 82px); width: 100%; }

        .custom-marker { filter: drop-shadow(0 4px 10px rgba(0, 0, 0, 0.6)); }

        .leaflet-popup-content-wrapper {
            border-radius: 18px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.8);
            border: 1px solid #334155;
            background: #f8fafd;
            overflow: hidden;
            min-width: 480px;
        }

        .popup-header {
            background: linear-gradient(to right, var(--navy), var(--deepblue));
            color: white;
            padding: 20px 26px;
            border-bottom: 4px solid var(--teal);
        }

        .popup-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
        .popup-city { opacity: 0.9; font-size: 15px; }

        .popup-body { padding: 22px 26px; line-height: 1.7; }
        .popup-body strong { display: inline-block; width: 115px; color: #1e3a8a; }

        .popup-image {
            width: 100%;
            max-height: 420px;
            object-fit: contain;
            border-radius: 12px;
            margin: 14px 0 20px 0;
            box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            border: 1px solid #e2e8f0;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--teal);
            color: #0f172a;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            margin-top: 12px;
            transition: all 0.3s;
        }

        .download-btn:hover {
            background: #67e8f9;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div id="header">
        <div class="logo">
            <i class="fas fa-building"></i>
            <div>
                <h1>Reserve Capital Partners</h1>
                <div class="subtitle">Texas Industrial Development Pipeline</div>
            </div>
        </div>

        <div class="controls">
            <select id="projectSelect">
                <option value="">— Select a Project —</option>
            </select>
        </div>

        <div class="stats">
            <strong>12 Active Projects</strong><br>
            <span style="opacity:0.85; font-size:13.8px;">Q2 2026 • Live Map</span>
        </div>
    </div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var map = L.map('map', { zoomControl: true }).setView([31.8, -97.2], 7);

        var topoLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri', maxZoom: 19 });
        var satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: '© Esri', maxZoom: 19 });
        topoLayer.addTo(map);

        var createIcon = (color) => L.divIcon({
            className: 'custom-marker',
            html: `<div style="width:34px;height:34px;background:${color};border:3.5px solid white;border-radius:50%;box-shadow:0 4px 10px rgba(0,0,0,0.45),inset 0 2px 4px rgba(255,255,255,0.7);display:flex;align-items:center;justify-content:center;"><div style="width:10px;height:10px;background:rgba(255,255,255,0.95);border-radius:50%;"></div></div>`,
            iconSize: [34, 34],
            iconAnchor: [17, 17],
            popupAnchor: [0, -24]
        });

        var orangeIcon = createIcon('#f59e0b');
        var tealIcon   = createIcon('#22d3ee');

        var developments = {
            construction: [
                { name: "Rockwall Industrial", city: "Rockwall, TX", lat: 32.90745, lng: -96.42921, size: "285,000 SF", status: "Under Construction", image: "https://raw.githubusercontent.com/jakepistone/rcp-development-map/main/rockwall-industrial.png", address: "", acres: "", lots: "", brochure: "" },
                { name: "South Prosperity", city: "Krugerville, TX", lat: 33.26495, lng: -96.98484, size: "64,950 SF", status: "Under Construction", image: "https://raw.githubusercontent.com/jakepistone/rcp-development-map/main/ChatGPT Image Jun 16, 2026, 07_42_34 AM.png", address: "Block A, Prosperity Way, Krugerville, TX 76227", acres: "21.41 AC", lots: "7 IOS Lots", brochure: "" },
                { name: "Waxahachie IOS", city: "Waxahachie, TX", lat: 32.36899, lng: -96.87912, size: "23,200 SF", status: "Under Construction", image: "https://raw.githubusercontent.com/jakepistone/rcp-development-map/main/ChatGPT Image Jun 15, 2026, 01_36_56 PM.png", address: "", acres: "", lots: "", brochure: "" },
                { name: "San Marcos IOS Park", city: "San Marcos, TX", lat: 29.80152, lng: -97.99933, size: "107,600 SF", status: "Under Construction", image: "https://raw.githubusercontent.com/jakepistone/rcp-development-map/main/san-marcos-ios-park.png", address: "6226 Old Bastrop Hwy, San Marcos, TX 78666", acres: "", lots: "8 IOS Lots", brochure: "" },
                { name: "Heritage 287", city: "Mansfield, TX", lat: 32.56719, lng: -97.11799, size: "258,444 SF", status: "Under Construction", image: "https://raw.githubusercontent.com/jakepistone/rcp-development-map/main/heritage-287.png", address: "", acres: "", lots: "", brochure: "" },
                { name: "Mansfield Lakeview", city: "Mansfield, TX", lat: 32.54287, lng: -97.06734, size: "22,800 SF", status: "Under Construction", image: "https://raw.githubusercontent.com/jakepistone/rcp-development-map/main/mansfield-lakeview.png", address: "1266 Lakeview Drive, Mansfield, TX 76065", acres: "13.96 AC", lots: "", brochure: "" },
                { name: "Melissa Industrial - Master Halco", city: "Melissa, TX", lat: 33.29634, lng: -96.53752, size: "", status: "Under Construction", image: "https://raw.githubusercontent.com/jakepistone/rcp-development-map/main/ChatGPT Image Jun 15, 2026, 01_44_26 PM.png", address: "3550 Industrial Drive, Melissa, TX 75454", acres: "3.34 AC", lots: "1 IOS Lots", brochure: "" }
            ],
            pipeline: [
                { name: "Sherman IOS", city: "Sherman, TX", lat: 33.68906, lng: -96.65162, size: "", status: "Available", image: "https://raw.githubusercontent.com/jakepistone/rcp-development-map/main/ChatGPT Image Jun 15, 2026, 01_41_30 PM.png", address: "4800 FM 1417, Sherman, Texas 75092", acres: "39.09 AC", lots: "7 IOS Lots", brochure: "https://raw.githubusercontent.com/jakepistone/rcp-development-map/main/Sherman- National IOS .pdf" },
                { name: "Waxahachie FM66L", city: "Waxahachie, TX", lat: 32.36899, lng: -96.87912, size: "23,200 SF", status: "Delivering Q1 2027", image: "https://raw.githubusercontent.com/jakepistone/rcp-development-map/main/ChatGPT Image Jun 15, 2026, 01_36_56 PM.png", address: "FM66L, Waxahachie, TX 75168", acres: "", lots: "6 IOS Lots", brochure: "" },
                { name: "Alvarado 22.9", city: "Alvarado, TX", lat: 32.41677, lng: -97.17536, size: "", status: "Available", image: "https://raw.githubusercontent.com/jakepistone/rcp-development-map/main/alvarado-22.9.png", address: "8749 E US-67, Alvarado, TX 76009", acres: "12.00 AC", lots: "2 IOS Lots", 
                  brochure: "https://raw.githubusercontent.com/jakepistone/rcp-development-map/main/Alvarado - National IOS.pdf" },
                { name: "Royse City Phase II", city: "Royse City, TX", lat: 32.975, lng: -96.333, company: "RCP Fund III", status: "Active Pipeline", image: "", address: "", acres: "", lots: "", brochure: "" },
                { name: "I-35 & I-20 South FW", city: "Fort Worth, TX", lat: 32.75, lng: -97.31, size: "494,580 SF", company: "BAIR Holdings", status: "Active Pipeline", image: "", address: "", acres: "", lots: "", brochure: "" },
                { name: "North Fort Worth", city: "North Fort Worth, TX", lat: 32.99283, lng: -97.28642, size: "22,800 SF", status: "Active Pipeline", image: "", address: "", acres: "5.33 AC", lots: "", brochure: "" }
            ]
        };

        var allProjects = [...developments.construction, ...developments.pipeline];
        var markers = {};

        var constructionLayer = L.layerGroup();
        var pipelineLayer = L.layerGroup();

        function addMarkers(group, data, icon) {
            data.forEach(dev => {
                const html = `
                    <div>
                        <div class="popup-header">
                            <div class="popup-title">${dev.name}</div>
                            <div class="popup-city">${dev.city}</div>
                        </div>
                        <div class="popup-body">
                            ${dev.image ? `<img src="${dev.image}" class="popup-image" alt="${dev.name} Site Plan">` : ''}
                            ${dev.address ? `<div><strong>Address:</strong> ${dev.address}</div>` : ''}
                            ${dev.acres ? `<div><strong>Acres:</strong> ${dev.acres}</div>` : ''}
                            ${dev.size ? `<div><strong>Building:</strong> ${dev.size}</div>` : ''}
                            ${dev.lots ? `<div><strong>Lots:</strong> ${dev.lots}</div>` : ''}
                            
                            ${dev.brochure ? `<a href="${dev.brochure}" download class="download-btn"><i class="fas fa-download"></i> Brochure Download</a>` : ''}
                            
                            <div class="status-tag" style="background: ${dev.status === 'Available' ? '#d1fae5' : '#fef3c7'}; color: ${dev.status === 'Available' ? '#0f766e' : '#92400e'};">
                                ${dev.status}
                            </div>
                        </div>
                    </div>
                `;

                var marker = L.marker([dev.lat, dev.lng], { icon: icon, riseOnHover: true })
                    .bindPopup(html, { maxWidth: 520 })
                    .addTo(group);
                markers[dev.name] = marker;
            });
        }

        addMarkers(constructionLayer, developments.construction, orangeIcon);
        addMarkers(pipelineLayer, developments.pipeline, tealIcon);

        constructionLayer.addTo(map);
        pipelineLayer.addTo(map);

        L.control.layers({
            "🗺️ Topographic": topoLayer,
            "🛰️ Satellite": satelliteLayer
        }, {
            "🟠 Under Construction": constructionLayer,
            "🟢 Active Pipeline": pipelineLayer
        }, { collapsed: false, position: 'topright' }).addTo(map);

        var legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            var div = L.DomUtil.create('div', 'legend');
            div.style.cssText = 'background:rgba(15,23,42,0.97); padding:16px 22px; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.6); border:1px solid #334155; color:white;';
            div.innerHTML = `
                <div style="font-weight:700; color:var(--gold); margin-bottom:12px;">Development Status</div>
                <div style="display:flex; align-items:center; gap:12px; margin:8px 0;"><div style="width:26px;height:26px;background:#f59e0b;border-radius:50%;"></div><strong>Under Construction</strong></div>
                <div style="display:flex; align-items:center; gap:12px; margin:8px 0;"><div style="width:26px;height:26px;background:#22d3ee;border-radius:50%;"></div><strong>Active Pipeline</strong></div>
            `;
            return div;
        };
        legend.addTo(map);

        const select = document.getElementById('projectSelect');
        allProjects.forEach(project => {
            const option = document.createElement('option');
            option.value = project.name;
            option.textContent = project.name;
            select.appendChild(option);
        });

        select.addEventListener('change', function() {
            const selectedName = this.value;
            if (!selectedName) return;
            const project = allProjects.find(p => p.name === selectedName);
            if (project && markers[selectedName]) {
                map.flyTo([project.lat, project.lng], 15, { duration: 1.6, paddingTopLeft: [0, 100] });
                setTimeout(() => markers[selectedName].openPopup(), 1700);
            }
        });
    </script>
</body>
</html>
